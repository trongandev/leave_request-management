server {
    listen 80;
    server_name lrm.io.vn; # Hoặc thay bằng domain của bạn nếu có

    root /home/leave_request-management/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
    # Cấu hình log để dễ dàng debug khi có lỗi
    access_log /var/log/nginx/my-app-access.log;
    error_log /var/log/nginx/my-app-error.log;
}

server {
    listen 80;
    server_name api.lrm.io.vn;

    # Cấu hình cho API Backend (NestJS)
    location / {
        proxy_pass http://localhost:5050;
        
        # Các header bắt buộc để NestJS lấy được IP thật của Client
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Chuyển tiếp các thông tin về IP và Protocol
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tăng thời gian timeout cho các request xử lý lâu (như export báo cáo)
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
    }

    # Nếu bạn dùng tiền tố /api trong NestJS, bạn có thể tách riêng như này (Tùy chọn)
    # location /api {
    #     proxy_pass http://localhost:3000;
    #     ... các cấu hình tương tự bên trên ...
    # }

    # Cấu hình log
    access_log /var/log/nginx/nestjs_access.log;
    error_log /var/log/nginx/nestjs_error.log;
}